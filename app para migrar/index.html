<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f1115">
  <meta name="description" content="Controla los mantenimientos de tu moto">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="assets/icon-192.svg">
  <link rel="apple-touch-icon" href="assets/icon-192.svg">
  <title>MotoMaint — Tu moto al día</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <div class="onboarding">
      <div class="onboarding-illu">
        <svg width="60" height="60" viewBox="0 0 64 64" fill="none">
          <path d="M16 44l8-20h16l8 20" stroke="url(#og)" stroke-width="3" stroke-linejoin="round" fill="none"></path>
          <circle cx="20" cy="46" r="6" stroke="url(#og)" stroke-width="3" fill="none"></circle>
          <circle cx="44" cy="46" r="6" stroke="url(#og)" stroke-width="3" fill="none"></circle>
          <path d="M24 24l4-8h8l4 8" stroke="url(#og)" stroke-width="3" stroke-linejoin="round" fill="none"></path>
          <defs>
            <linearGradient id="og" x1="0" y1="0" x2="64" y2="64">
              <stop offset="0" stop-color="#ff7a18"></stop>
              <stop offset="1" stop-color="#ffb347"></stop>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <h1>Tu moto, <span>bien cuidada</span></h1>
      <p>Registra los mantenimientos y nunca más se te pase un cambio de aceite.</p>

      <form id="onboard-form">
        <div class="form-group">
          <label class="form-label" for="marca">Marca</label>
          <input class="form-input" type="text" id="marca" placeholder="Ej: Yamaha, Honda, Bajaj..." required autocomplete="off">
        </div>
        <div class="form-group">
          <label class="form-label" for="modelo">Modelo</label>
          <input class="form-input" type="text" id="modelo" placeholder="Ej: FZ 250, CB 190R, Pulsar NS..." required autocomplete="off">
        </div>
        <div class="form-group">
          <label class="form-label" for="km">Kilometraje actual</label>
          <input class="form-input" type="number" id="km" placeholder="Ej: 12500" required min="0" inputmode="numeric">
        </div>
        <button type="submit" class="btn btn-primary" style="margin-top: 12px;">
          Empezar <span style="font-size: 1.2rem;">→</span>
        </button>
      </form>
    </div>
  </div>

  <div id="toast" class="toast" aria-live="polite"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
